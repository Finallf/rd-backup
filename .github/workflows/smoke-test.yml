name: Smoke Test

on:
  push:
    branches: [master, beta]
  pull_request:
    branches: [master, beta]

jobs:
  php-syntax:
    name: PHP Syntax Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP 8.3
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: none

      - name: Lint all PHP files
        run: |
          ERRORS=0
          while IFS= read -r file; do
            if ! php -l "$file" > /dev/null 2>&1; then
              echo "::error file=$file::Syntax error"
              php -l "$file"
              ERRORS=$((ERRORS + 1))
            fi
          done < <(find . -type f -name '*.php' -not -path './node_modules/*' -not -path './vendor/*')

          if [ "$ERRORS" -gt 0 ]; then
            echo "::error::Found $ERRORS file(s) with syntax errors"
            exit 1
          else
            echo "✅ All PHP files passed syntax check"
          fi

  phpcs:
    name: PHPCS + WPCS Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP 8.3 + Composer
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: composer:v2
          coverage: none

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: vendor
          key: ${{ runner.os }}-composer-${{ hashFiles('composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install Composer dependencies
        run: composer install --no-progress --no-interaction --prefer-dist

      - name: Run PHPCS
        run: vendor/bin/phpcs
